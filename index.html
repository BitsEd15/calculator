<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="calculator">
        <div class="calculator__display">
            <p class="calculator__display-content"></p>
        </div>
        <div class="calculator__buttons">
            <button class="g-button g-button--svg--grey calculator__buttons-clear">AC</button>
            <button class="g-button g-button--svg--grey calculator__buttons-negative">+/-</button>
            <button class="g-button g-button--svg--grey calculator__buttons-percent">%</button>
            <button class="g-button g-button--svg calculator__buttons-operators">/</button>
            <button class="g-button g-button--number">7</button>
            <button class="g-button g-button--number">8</button>
            <button class="g-button g-button--number">9</button>
            <button class="g-button g-button--svg calculator__buttons-operators">*</button>
            <button class="g-button g-button--number">4</button>
            <button class="g-button g-button--number">5</button>
            <button class="g-button g-button--number">6</button>
            <button class="g-button g-button--svg calculator__buttons-operators">-</button>
            <button class="g-button g-button--number">1</button>
            <button class="g-button g-button--number">2</button>
            <button class="g-button g-button--number">3</button>
            <button class="g-button g-button--svg calculator__buttons-operators">+</button>
            <button class="g-button calculator__buttons-image"><img src="./imgs/calculator-svgrepo-com.svg"
                    alt=""></button>
            <button class="g-button g-button--number">0</button>
            <button class="g-button calculator__buttons-comma">.</button>
            <button class="g-button g-button--svg g-button--equal calculator__buttons-equal">=</button>
        </div>
    </div>

    <script src="index.js"></script>
</body>

</html>
